<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Vision Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 90%;
            max-width: 1000px;
            gap: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            margin-top: 5px;
            font-size: 1rem;
        }

        /* Glassmorphism Panel */
        .panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .stream-container {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .stream-img {
            max-width: 100%;
            display: block;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        button {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            font-size: 0.9rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .target-tag {
            display: inline-block;
            background: rgba(167, 139, 250, 0.2);
            color: #a78bfa;
            border: 1px solid rgba(167, 139, 250, 0.3);
            padding: 4px 10px;
            border-radius: 16px;
            margin-right: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Hybrid Vision System</h1>
            <p>YOLOv11 & YOLO-World Open-Vocabulary Detection</p>
        </div>

        <div class="panel">
            <div class="stream-container">
                <img src="/stream" alt="Camera Stream" class="stream-img" id="video-stream">
            </div>
        </div>

        <div class="panel controls">
            <h3>🎯 Target Configurator</h3>
            <div class="input-group">
                <input type="text" id="target-input" placeholder="e.g. pen, phone, bottle (comma separated)" autocomplete="off">
                <button onclick="updateTargets()">Set Targets</button>
            </div>
            <div class="status" id="status-box">
                Active Targets: <span id="active-targets">None</span>
            </div>
        </div>
    </div>

    <script>
        // 현재 타겟 목록 불러오기
        async function fetchCurrentTargets() {
            try {
                const response = await fetch('/targets');
                const data = await response.json();
                renderTags(data.targets);
                
                // 입력창에도 세팅
                if(data.targets && data.targets.length > 0) {
                    document.getElementById('target-input').value = data.targets.join(', ');
                }
            } catch (error) {
                console.error("Failed to fetch targets:", error);
                document.getElementById('active-targets').innerText = "Disconnected";
            }
        }

        // 태그 렌더링
        function renderTags(targets) {
            const container = document.getElementById('active-targets');
            if (!targets || targets.length === 0) {
                container.innerHTML = '<em>None</em>';
                return;
            }
            
            container.innerHTML = targets.map(t => `<span class="target-tag">${t}</span>`).join('');
        }

        // 사용자가 새 타겟 설정
        async function updateTargets() {
            const inputVal = document.getElementById('target-input').value;
            // 콤마로 분리하고 앞뒤 공백 제거 및 빈 문자열 날리기
            const targetList = inputVal.split(',')
                                       .map(s => s.trim())
                                       .filter(s => s !== "");

            const btn = document.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "Updating...";
            
            try {
                const response = await fetch('/targets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ targets: targetList })
                });
                
                const data = await response.json();
                renderTags(data.targets);
                
            } catch (error) {
                console.error("Failed to update targets:", error);
                alert("타겟 업데이트에 실패했습니다. 서버를 확인해주세요.");
            } finally {
                btn.innerText = originalText;
            }
        }

        // 엔터키 지원
        document.getElementById('target-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                updateTargets();
            }
        });

        // 페이지 로드 시 현재 타겟 정보 가져오기
        window.addEventListener('DOMContentLoaded', fetchCurrentTargets);
        
        // 정기적으로 타겟 정보 갱신 (선택사항)
        setInterval(fetchCurrentTargets, 5000);
    </script>

</body>
</html>
